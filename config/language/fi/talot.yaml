# Config file for generating zebra puzzles in Finnish with the classic "houses" theme.

# Theme
theme: fi_talot

# Attributes
# The attributes are defined as a dictionary of dictionaries.
# The outer dictionary has the attribute category as key, and the inner dictionary has the attribute value as key and the attribute description as value.
# The attributes below should be in the preferred order of categories in the clues.
# Attribute format: [nominative, predicate "is X", predicate "is not X", genitive]
# The genitive form is stored at index 3 (mapped to 'acc' in clue_cases_dict).

attributes:

    kansallisuudet:
        Tanska: ['tanskalainen', 'on tanskalainen', 'ei ole tanskalainen', 'tanskalaisen']
        Ruotsi: ['ruotsalainen', 'on ruotsalainen', 'ei ole ruotsalainen', 'ruotsalaisen']
        Latvia: ['latvialainen', 'on latvialainen', 'ei ole latvialainen', 'latvialaisen']
        Ranska: ['ranskalainen', 'on ranskalainen', 'ei ole ranskalainen', 'ranskalaisen']
        Espanja: ['espanjalainen', 'on espanjalainen', 'ei ole espanjalainen', 'espanjalaisen']
        Italia: ['italialainen', 'on italialainen', 'ei ole italialainen', 'italialaisen']
        Norja: ['norjalainen', 'on norjalainen', 'ei ole norjalainen', 'norjalaisen']
        Färsaaret: ['färsaarelainen', 'on färsaarelainen', 'ei ole färsaarelainen', 'färsaarelaisen']
        Alankomaat: ['alankomaalainen', 'on alankomaalainen', 'ei ole alankomaalainen', 'alankomaalaisen']
        Islanti: ['islantilainen', 'on islantilainen', 'ei ole islantilainen', 'islantilaisen']
        Iso-Britannia: ['brittiläinen', 'on brittiläinen', 'ei ole brittiläinen', 'brittiläisen']

