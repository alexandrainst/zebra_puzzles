        poliisi: ['poliisi', 'on poliisi', 'ei ole poliisi', 'poliisin']
        sairaanhoitaja: ['sairaanhoitaja', 'on sairaanhoitaja', 'ei ole sairaanhoitaja', 'sairaanhoitajan']
        opettaja: ['opettaja', 'on opettaja', 'ei ole opettaja', 'opettajan']
        ohjelmistokehittäjä: ['ohjelmistokehittäjä', 'on ohjelmistokehittäjä', 'ei ole ohjelmistokehittäjä', 'ohjelmistokehittäjän']
        myyjä: ['myyjä', 'on myyjä', 'ei ole myyjä', 'myyjän']

    lemmikkieläimet:
        kissa: ['kissanomistaja', 'omistaa kissan', 'ei omista kissaa', 'kissanomistajan']
        koira: ['koiranomistaja', 'omistaa koiran', 'ei omista koiraa', 'koiranomistajan']
        kani: ['kaninomistaja', 'omistaa kanin', 'ei omista kania', 'kaninomistajan']
        seepra: ['seepranomistaja', 'omistaa seepran', 'ei omista seepraa', 'seepranomistajan']
        undulaatti: ['undulaatinomistaja', 'omistaa undulaatin', 'ei omista undulaattia', 'undulaatinomistajan']
        etana: ['etananomistaja', 'omistaa etanan', 'ei omista etanaa', 'etananomistajan']
        tikku-ukko: ['tikku-ukon omistaja', 'omistaa tikku-ukon', 'ei omista tikku-ukkoa', 'tikku-ukon omistajan']

    juomat:
        mehu: ['mehunjuoja', 'juo mehua', 'ei juo mehua', 'mehunjuojan']
        kahvi: ['kahvinjuoja', 'juo kahvia', 'ei juo kahvia', 'kahvinjuojan']
        maito: ['maidonjuoja', 'juo maitoa', 'ei juo maitoa', 'maidonjuojan']
        smoothie: ['smoothienjuoja', 'juo smoothieta', 'ei juo smoothieta', 'smoothienjuojan']
        kaakao: ['kaakaojuoja', 'juo kaakaota', 'ei juo kaakaota', 'kaakaojuojan']
        tee: ['teenjuoja', 'juo teetä', 'ei juo teetä', 'teenjuojan']
        limonaadi: ['limonaadinjuoja', 'juo limonaadia', 'ei juo limonaadia', 'limonaadinjuojan']

    lempikirjallisuus:
        tietokirjallisuus: ['tietokirjallisuuden lukija', 'lukee tietokirjallisuutta', 'ei lue tietokirjallisuutta', 'tietokirjallisuuden lukijan']
        dekkarit: ['dekkarinlukija', 'lukee dekkareita', 'ei lue dekkareita', 'dekkarinlukijan']
        fantasia: ['fantasianlukija', 'lukee fantasiaa', 'ei lue fantasiaa', 'fantasianlukijan']
