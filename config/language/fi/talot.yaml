        päärynä: ['henkilö, joka pitää päärynöistä,', 'pitää päärynöistä', 'ei pidä päärynöistä', 'henkilön, joka pitää päärynöistä,']
        appelsiini: ['henkilö, joka pitää appelsiineista,', 'pitää appelsiineista', 'ei pidä appelsiineista', 'henkilön, joka pitää appelsiineista,']
        banaani: ['henkilö, joka pitää banaaneista,', 'pitää banaaneista', 'ei pidä banaaneista', 'henkilön, joka pitää banaaneista,']
        mansikka: ['henkilö, joka pitää mansikoista,', 'pitää mansikoista', 'ei pidä mansikoista', 'henkilön, joka pitää mansikoista,']
        mustaherukka: ['henkilö, joka pitää mustaherukoista,', 'pitää mustaherukoista', 'ei pidä mustaherukoista', 'henkilön, joka pitää mustaherukoista,']
        ahomansikka: ['henkilö, joka pitää ahomansikasta,', 'pitää ahomansikasta', 'ei pidä ahomansikasta', 'henkilön, joka pitää ahomansikasta,']

# Clues
# Clue names and text for the prompt depending on the clue type.
# Clue names should not be edited, but they can be a subset of the full list of implemented clues.
# attribute_desc_2 and attribute_desc_3 are always in genitive (stored at 'acc' index 3).
# NOTE: The list of clues could be extended by adding non-unique attributes, superattributes (e.g. large animal), ordinal attributes, objects on a grid etc.
clues_dict:
    found_at: '{attribute_desc} asuu talossa numero {i_object}.'
    not_at: '{attribute_desc} ei asu talossa numero {i_object}.'
    next_to: '{attribute_desc_1} asuu {attribute_desc_2} vieressä.'                                                                    # Requires n_objects > 2, otherwise use not_same_object
    not_next_to: '{attribute_desc_1} ei asu {attribute_desc_2} vieressä, eivätkä he ole sama henkilö.'                                 # Requires n_objects > 2, otherwise it cannot be used
    just_left_of: '{attribute_desc_1} asuu heti {attribute_desc_2} vasemmalla puolella.'                                               # Requires n_objects > 2, otherwise use left_of
    just_right_of: '{attribute_desc_1} asuu heti {attribute_desc_2} oikealla puolella.'                                                # Requires n_objects > 2, otherwise use right_of
    left_of: '{attribute_desc_1} asuu {attribute_desc_2} vasemmalla puolella.'
    right_of: '{attribute_desc_1} asuu {attribute_desc_2} oikealla puolella.'
    same_object: '{attribute_desc_1} {attribute_desc_2}.'                                                                              # Requires n_attributes > 1, otherwise it cannot be used
    not_same_object: '{attribute_desc_1} {attribute_desc_2}.'                                                                         # Requires n_attributes > 1, otherwise it cannot be used
    between: '{attribute_desc_2} asuu {attribute_desc_1} ja {attribute_desc_3} välissä.'                                              # Requires n_objects > 2, otherwise it cannot be used
    not_between: '{attribute_desc_1} ei asu {attribute_desc_2} ja {attribute_desc_3} välissä, ja he ovat kolme eri henkilöä.'          # Requires n_objects > 2, otherwise it cannot be used
    multiple_between: '{attribute_desc_1} ja {attribute_desc_2} asuvat {n_between} talon päässä toisistaan.'                          # Requires n_objects > 3, otherwise it cannot be used
    one_between: '{attribute_desc_1} ja {attribute_desc_2} välissä on yksi talo.'                                                     # Requires n_objects > 2, otherwise it cannot be used

# Define a list of grammatical cases for attribute descriptions in the clues.
# Finnish only uses nominative and genitive. Genitive is stored at index 3, aliased as 'acc'.
clue_cases_dict:
    found_at: ['nom']
    not_at: ['nom']
    next_to: ['nom', 'acc']
    not_next_to: ['nom', 'acc']
    just_left_of: ['nom', 'acc']
    just_right_of: ['nom', 'acc']
    left_of: ['nom', 'acc']
    right_of: ['nom', 'acc']
    same_object: ['nom', 'none']
    not_same_object: ['nom', 'none']
    between: ['acc', 'nom', 'acc'] # Note that second argument corresponds to the first object in this clue.
    not_between: ['nom', 'acc', 'acc']
    multiple_between: ['nom', 'nom']
    one_between: ['acc', 'acc']

# Prompt
# We use two different prompt templates depending on whether we have multiple attributes in each category or just one.
# prompt_and is the word used for separating the last two attributes in a list of attributes.

prompt_and: ja

prompt_templates:
    - |
        Talorivistö on numeroitu 1:stä {n_objects}:een vasemmalta oikealle.

        Jokaisessa talossa asuu henkilö, jolla on ainutlaatuinen ominaisuus kussakin seuraavista kategorioista:

        {chosen_attributes_str}

        Lisäksi tiedämme seuraavaa:

        {chosen_clues_str}

        Kuka asuu missä talossa, ja mitkä ominaisuudet hänellä on?

        Ole hyvä ja anna vastauksesi JSON dictionary -muodossa. Jokainen key on object_X, missä X on talon numero. Jokainen value on lista kyseisen talon asukkaan ominaisuuksista edellä mainituista kategorioista.

        Seuraava on esimerkki vastausmuodosta:

        {solution_template}
    - |
        Talorivistö on numeroitu 1:stä {n_objects}:een vasemmalta oikealle.

        Jokaisessa talossa asuu henkilö, jolla on ainutlaatuinen ominaisuus kategorian {chosen_attributes_str} osalta.

        Lisäksi tiedämme seuraavaa:

        {chosen_clues_str}

        Mikä ominaisuus on kullakin talon asukkaalla?

        Ole hyvä ja anna vastauksesi JSON dictionary -muodossa. Jokainen key on object_X, missä X on talon numero. Jokainen value on lista, joka sisältää kyseisen kategorian ominaisuuden, joka kuuluu talon numero X asukkaalle.

        Seuraava on esimerkki vastausmuodosta:

        {solution_template}

# Red herrings
# The red herring attributes that are not used in the main clues, but are included in the prompt to make the puzzle more challenging.
# NOTE: More types could be added such as "The person with a cactus is not the baker"
# Red herring attribute format: [nominative, predicate "is/does X", genitive]
# Genitive is stored at index 2 (aliased as 'acc' in red_herring_cases_dict).

red_herring_clues_dict:
    same_herring: '{attribute_desc} {attribute_desc_herring}.'
    next_to_herring: '{attribute_desc} asuu {attribute_desc_herring} vieressä.'
    double_herring: '{attribute_desc_herring_1} {attribute_desc_herring_2}.'
    fact: '{fact}.'
    object_fact: '{attribute_desc} tietää, että {fact}.'
    friends: '{attribute_desc} on hyvä ystävä {attribute_desc_herring} kanssa.'
    herring_found_at: '{attribute_desc_herring} asuu talossa numero {i_object}.'
    herring_not_at: '{attribute_desc_herring} ei asu talossa numero {i_object}.'

red_herring_cases_dict:
    same_herring: ['nom', 'none']
    next_to_herring: ['nom', 'acc']
    double_herring: ['nom', 'none']
    fact: ['none']
    object_fact: ['nom', 'none']
    friends: ['nom', 'acc']
    herring_found_at: ['nom']
    herring_not_at: ['nom']

